<!DOCTYPE html>
<html>
<body>
<h1>Sleep App</h1>
<input id="age"><input id="stress"><input id="activity"><input id="bmi">
<button onclick="predict()">Predict</button>
<button onclick="plot()">Plot</button>
<h2 id="res"></h2>
<script>
async function predict(){
 const data={age:+age.value,stress:+stress.value,activity:+activity.value,bmi:+bmi.value};
 const r=await fetch("http://127.0.0.1:8000/predict",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
 const j=await r.json();
 res.innerText=j.sleep_quality;
}
async function plot(){
 const data={age:+age.value,stress:+stress.value,activity:+activity.value,bmi:+bmi.value};
 await fetch("http://127.0.0.1:8000/plot",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
 alert("plot saved");
}
</script>
</body>
</html>
